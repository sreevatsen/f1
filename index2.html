<!DOCTYPE html>
<html>
<head>
    <title>F1 Visual Pro: Safe Mode</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #status { color: #00d2be; margin-bottom: 10px; font-weight: bold; background: #333; padding: 10px; display: inline-block; border-radius: 5px; }
        canvas { border: 2px solid #444; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h1>F1 Radar: Safe Mode</h1>
    <div id="status">Starting System...</div>
    <br>
    <canvas id="trackCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        async function update() {
            try {
                // 1. Get the latest location data for all cars
                const response = await fetch('https://api.openf1.org/v1/location?session_key=latest');
                const data = await response.json();

                if (!data || data.length === 0) {
                    statusDiv.innerText = "Connected, but no cars are moving right now.";
                    return;
                }

                statusDiv.innerText = `Success! Tracking ${data.length} data points.`;

                // 2. Clear the screen
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 3. Simple Drawing Logic
                // We use the first car we find as our "0,0" center point
                const center = data[0];
                const zoom = 0.03; 

                data.forEach(car => {
                    // Convert F1 coordinates to pixels
                    const x = (car.x - center.x) * zoom + 400;
                    const y = (center.y - car.y) * zoom + 300;

                    // Draw a dot for each car
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = car.driver_number == 63 ? "#00d2be" : "#ff1801"; // Mercedes Teal or Ferrari Red
                    ctx.fill();
                    
                    // Add the driver number
                    ctx.fillStyle = "white";
                    ctx.font = "10px Arial";
                    ctx.fillText(car.driver_number, x + 8, y);
                });

            } catch (error) {
                statusDiv.innerText = "Error: Check Console (F12) for details.";
                console.error("API Error:", error);
            }
        }

        // Run this every 2 seconds
        setInterval(update, 2000);
        update(); // Run once immediately
    </script>
</body>
</html>
